# The platform's only deploy path.
#
# It is triggered by repository_dispatch, and that is not ceremony — it is forced, and it is also what
# makes the whole thing safe:
#
#   * A self-hosted runner can only be scoped to ONE REPOSITORY. Org-level runners (and runner groups)
#     are an organization feature, and AndresI19 is a personal account. So five app repos cannot share
#     one runner — and a reusable workflow would not help, because its jobs run in the CALLING repo's
#     context and would need a runner registered there.
#   * Therefore the runner lives here, and here only. No app repo can reach it at all — not by label,
#     not by a crafted workflow, not from a fork. It does not exist in their world.
#   * And because there is exactly ONE runner, every deploy is serialized for free: the runner takes
#     one job at a time off GitHub's job-assignment queue. A concurrency group is the WRONG way to get
#     that (it CANCELS excess pending jobs) and is deliberately absent.
#
# ONE dispatch per repo-release, carrying that repo's whole component list. A repo that ships several
# components (project-platform → home + platform-auth; rs-mcp-server → rs-mcp-server + fvt-traffic)
# deploys them together in this one job and reports them in ONE Discord message — rather than a
# separate ping per component for what is really a single release at a single tag.
name: release

on:
  repository_dispatch:
    types: [release]

jobs:
  release:
    runs-on: [self-hosted, platform]
    steps:
      - name: The deploy scripts
        uses: actions/checkout@v4

      # The source, at the exact tag the app repo just cut. All the repo's components build from this
      # one checkout — they share the repo and the tag, which is the whole reason they share a message.
      # Checking out by TAG (not SHA) is deliberate: the tag IS the version.
      - name: ${{ github.event.client_payload.repo }} @ ${{ github.event.client_payload.version }}
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repo }}
          ref: ${{ github.event.client_payload.version }}
          path: src
          submodules: recursive # the quiz vendors @platform/ui as a submodule; without it, npm ci fails

      # The chart. The deploy is `helm upgrade` now (the platform migrated off kustomize), and helm
      # needs the chart source to render the release — deploy.sh reads it from ./orchestration/chart.
      # `main`, not a tag: the chart's templates are stable and version-independent of the app images —
      # only the image tags, passed as --set values, change per release. platform-orchestration is
      # public, so the default GITHUB_TOKEN checks it out with no extra credential.
      - name: The chart — platform-orchestration@main
        uses: actions/checkout@v4
        with:
          repository: AndresI19/platform-orchestration
          ref: main
          path: orchestration

      # Build + deploy every component in the release, attempting all of them even if one fails, and
      # recording a per-component result the report step reads. NOT `set -e`: one component's failure
      # must not skip the others or the report.
      - name: Build and deploy
        run: |
          set -uo pipefail
          COMPONENTS="${{ github.event.client_payload.components || github.event.client_payload.component }}"
          V="${{ github.event.client_payload.version }}"
          RESULTS="${RUNNER_TEMP}/results.txt"; : > "$RESULTS"
          overall=0
          for c in $COMPONENTS; do
            echo "::group::${c} ${V}"
            prev="$(kubectl -n platform get deploy "$c" -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo '?')"
            # Record a per-component line: `component|status|detail`. On success detail is the image; on
            # failure it is WHY, so the report can chart every component's fate — the failed ones say
            # what happened (build failed / rolled back) rather than a bare mark.
            if ! ./deploy/build.sh "$c" "$V" src; then
              echo "${c}|fail|build failed" >> "$RESULTS"; overall=1
            elif ! ./deploy/deploy.sh "$c" "$V"; then
              echo "${c}|fail|rolled back to ${prev}" >> "$RESULTS"; overall=1
            else
              echo "${c}|ok|registry:5000/${c}:${V}" >> "$RESULTS"
            fi
            echo "::endgroup::"
          done
          exit $overall

      # VISIBILITY — one message for the whole release. GitHub's own signals are all PULL (a red ✗ you
      # go looking for), and this platform's recurring bug is the SILENT one (units never installed,
      # /version stuck on "snapshot", a concurrency group cancelling deploys with no trace). So every
      # run PUSHES its outcome to Discord and writes a job summary, success OR failure (if: always()).
      - name: Report the outcome
        if: always()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          V: ${{ github.event.client_payload.version }}
          REPO: ${{ github.event.client_payload.repo }}
          COMPONENTS: ${{ github.event.client_payload.components || github.event.client_payload.component }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # Provenance, gathered by the app repo's release.yml (which alone has the merge context) and
          # passed in the dispatch. All optional: a direct/manual dispatch carries none, and the message
          # simply omits the PR footer and link. Never interpolated into a command — read as env only.
          PR: ${{ github.event.client_payload.pr }}
          PR_URL: ${{ github.event.client_payload.pr_url }}
          AUTHOR: ${{ github.event.client_payload.author }}
          MERGER: ${{ github.event.client_payload.merger }}
          BRANCH: ${{ github.event.client_payload.branch }}
        run: |
          set -euo pipefail
          RESULTS="${RUNNER_TEMP}/results.txt"
          if [ "${{ job.status }}" = "success" ]; then EMOJI="✅"; COLOR=3066993; else EMOJI="❌"; COLOR=15548997; fi

          # One line per component, from the results file. If it is missing (a failure before the loop,
          # e.g. checkout), fall back to marking the whole component list failed so the message still
          # says something true.
          # Same shape as the success message, which is the point: title carries the service + version,
          # and each component charts on its own line. A success line ends in `→ \`image\``; a failure
          # line ends in `— <what happened>`. So a mixed release (one up, one rolled back) reads as one
          # coherent chart rather than a generic "FAILED".
          body=""
          summary="## ${EMOJI} ${REPO##*/} \`${V}\`"$'\n\n'"| component | result |"$'\n'"|---|---|"$'\n'
          if [ -f "$RESULTS" ]; then
            while IFS='|' read -r c st detail; do
              [ -z "$c" ] && continue
              if [ "$st" = ok ]; then
                body="${body}✅ \`${c}\` → \`${detail}\`"$'\n'
                summary="${summary}| \`${c}\` | ✅ \`${detail}\` |"$'\n'
              else
                body="${body}❌ \`${c}\` — ${detail}"$'\n'
                summary="${summary}| \`${c}\` | ❌ ${detail} |"$'\n'
              fi
            done < "$RESULTS"
          else
            for c in $COMPONENTS; do
              body="${body}❌ \`${c}\` — build/deploy did not run"$'\n'
              summary="${summary}| \`${c}\` | ❌ did not run |"$'\n'
            done
          fi

          # Provenance footer: "PR #23 by author · merged by X · branch". Every part is conditional —
          # the merger only appears when it differs from the author (the common case is they are the
          # same person, and repeating it is noise), and the whole footer is empty for a dispatch that
          # carried no PR (a manual/direct one), so those messages look exactly as before.
          foot=""
          if [ -n "${PR:-}" ]; then
            foot="PR #${PR}"
            [ -n "${AUTHOR:-}" ] && foot="${foot} by ${AUTHOR}"
            [ -n "${MERGER:-}" ] && [ "${MERGER}" != "${AUTHOR:-}" ] && foot="${foot} · merged by ${MERGER}"
            [ -n "${BRANCH:-}" ] && foot="${foot} · ${BRANCH}"
          fi

          echo "$summary" >> "$GITHUB_STEP_SUMMARY"

          [ -n "$WEBHOOK" ] || exit 0
          # Description on properly-indented lines using bash $'\n' — a line less-indented than this
          # run: block would terminate the YAML block scalar and make the workflow unparseable.
          desc="${body}"$'\n'"<${RUN_URL}>"
          # The embed is assembled with jq so the PR link (clickable title) and footer are added only
          # when present — an object merge with {} when absent leaves the base embed untouched.
          jq -n --arg t "${EMOJI} release — ${REPO##*/} ${V}" --arg d "$desc" --argjson c "$COLOR" \
            --arg url "${PR_URL:-}" --arg foot "$foot" \
            '{username:"platform-cicd",
              embeds:[( {title:$t, description:$d, color:$c}
                        + (if $url  != "" then {url:$url}               else {} end)
                        + (if $foot != "" then {footer:{text:$foot}}    else {} end) )]}' \
            | curl -fsS --retry 3 --retry-delay 2 --retry-all-errors -H 'Content-Type: application/json' -d @- "$WEBHOOK" >/dev/null \
            || echo "::warning::Discord notification failed after retries (non-fatal) — the deploy result stands" >&2
