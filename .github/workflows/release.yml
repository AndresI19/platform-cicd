# The platform's only deploy path.
#
# Triggered by repository_dispatch, which is forced, and is what makes it safe:
#
#   * A self-hosted runner can only be scoped to ONE REPOSITORY. Runner groups are an org feature and
#     AndresI19 is a personal account, so the app repos cannot share one runner — and a reusable
#     workflow would not help, its jobs run in the CALLING repo's context and would need a runner there.
#   * So the runner lives here, and here only. No app repo can reach it — not by label, not by a crafted
#     workflow, not from a fork.
#   * And with exactly ONE runner, every deploy is serialized for free off GitHub's job-assignment
#     queue. A concurrency group is the WRONG way to get that (it CANCELS excess pending jobs) and is
#     deliberately absent.
#
# ONE dispatch per repo-release, carrying that repo's whole component list, reported in ONE Discord
# message. Most components are built AND helm-deployed; fvt-traffic is the exception — built and pushed
# but runs on the host (fvt/), so its deploy step is skipped (see the build-and-deploy loop below).
name: release

on:
  repository_dispatch:
    types: [release]

jobs:
  release:
    runs-on: [self-hosted, platform]
    steps:
      - name: The deploy scripts
        uses: actions/checkout@v4

      # The source, at the exact tag the app repo just cut. All the repo's components build from this one
      # checkout. By TAG (not SHA) deliberately: the tag IS the version.
      - name: ${{ github.event.client_payload.repo }} @ ${{ github.event.client_payload.version }}
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repo }}
          ref: ${{ github.event.client_payload.version }}
          path: src
          submodules: recursive # the quiz vendors @platform/ui as a submodule; without it, npm ci fails

      # The chart. deploy.sh renders the release from the GENERIC service chart at
      # ./orchestration/charts/service — it carries no per-service values; each component's
      # Deployment/Service spec comes from its OWN repo (src/deploy/*.yaml), checked out above.
      # Orchestration owns the shared shape, the app repos own their resources. `main`, not a tag: the
      # templates are version-independent of the app images — only the image tags (--set values) change
      # per release. platform-orchestration is public, so the default GITHUB_TOKEN suffices.
      - name: The chart — platform-orchestration@main
        uses: actions/checkout@v4
        with:
          repository: AndresI19/platform-orchestration
          ref: main
          path: orchestration

      # Build + deploy every component, attempting all even if one fails, recording a per-component
      # result the report step reads. NOT `set -e`: one component's failure must not skip the others or
      # the report.
      - name: Build and deploy
        run: |
          set -uo pipefail
          COMPONENTS="${{ github.event.client_payload.components || github.event.client_payload.component }}"
          VERSION="${{ github.event.client_payload.version }}"
          RESULTS="${RUNNER_TEMP}/results.txt"; : > "$RESULTS"
          overall=0
          for c in $COMPONENTS; do
            echo "::group::${c} ${VERSION}"
            prev="$(kubectl -n platform get deploy "$c" -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo '?')"
            # Record a per-component line `component|status|detail`: on success detail is the image, on
            # failure it is WHY (build failed / not applied), so the report charts every component's fate.
            #
            # A deploy is ASYNCHRONOUS now (deploy.sh applies, an in-cluster Job watches). A failure here
            # means the deploy never STARTED (manifests rejected, or image not in the registry) and
            # nothing changed — prev is still serving. A rollout that starts and then stalls cannot be
            # reported from this job (the runner is long gone); the Job posts that to Discord itself.
            # Hence "deploying", not "deployed".
            if ! ./deploy/build.sh "$c" "$VERSION" src; then
              echo "${c}|fail|build failed" >> "$RESULTS"; overall=1
            elif [ "$c" = fvt-traffic ]; then
              # fvt-traffic is NOT a cluster workload — it runs on the host (fvt/compose.yml). CI builds
              # and pushes its image so the host can pull the newest :latest, but nothing in the chart
              # helm-deploys it. Refresh the host with `systemctl --user restart fvt`.
              echo "${c}|ok|registry:5000/${c}:${VERSION} (host runner — image built; restart fvt to adopt)" >> "$RESULTS"
            elif ! ./deploy/deploy.sh "$c" "$VERSION"; then
              echo "${c}|fail|not applied — ${prev} still running" >> "$RESULTS"; overall=1
            else
              echo "${c}|ok|registry:5000/${c}:${VERSION} (deploying — rollout-check reports)" >> "$RESULTS"
            fi
            echo "::endgroup::"
          done
          exit $overall

      # VISIBILITY — one message for the whole release. GitHub's own signals are all PULL (a red ✗ you
      # go looking for), and this platform's recurring bug is the SILENT one (units never installed,
      # /version stuck on "snapshot", a concurrency group cancelling deploys with no trace). So every
      # run PUSHES its outcome to Discord and writes a job summary, success OR failure (if: always()).
      - name: Report the outcome
        if: always()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ github.event.client_payload.version }}
          REPO: ${{ github.event.client_payload.repo }}
          COMPONENTS: ${{ github.event.client_payload.components || github.event.client_payload.component }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # Provenance, gathered by the app repo's release.yml (which alone has the merge context). All
          # optional: a direct/manual dispatch carries none and the message omits the PR footer/link.
          # Never interpolated into a command — read as env only.
          PR: ${{ github.event.client_payload.pr }}
          PR_URL: ${{ github.event.client_payload.pr_url }}
          AUTHOR: ${{ github.event.client_payload.author }}
          MERGER: ${{ github.event.client_payload.merger }}
          BRANCH: ${{ github.event.client_payload.branch }}
        run: |
          set -euo pipefail
          RESULTS="${RUNNER_TEMP}/results.txt"
          if [ "${{ job.status }}" = "success" ]; then EMOJI="✅"; COLOR=3066993; else EMOJI="❌"; COLOR=15548997; fi

          # One line per component, from the results file. If it is missing (a failure before the loop,
          # e.g. checkout), fall back to marking the whole list failed so the message still says
          # something true. A success line ends `→ \`image\``, a failure line ends `— <what happened>`,
          # so a mixed release reads as one coherent chart, not a bare "FAILED".
          body=""
          summary="## ${EMOJI} ${REPO##*/} \`${VERSION}\`"$'\n\n'"| component | result |"$'\n'"|---|---|"$'\n'
          if [ -f "$RESULTS" ]; then
            while IFS='|' read -r c st detail; do
              [ -z "$c" ] && continue
              if [ "$st" = ok ]; then
                body="${body}✅ \`${c}\` → \`${detail}\`"$'\n'
                summary="${summary}| \`${c}\` | ✅ \`${detail}\` |"$'\n'
              else
                body="${body}❌ \`${c}\` — ${detail}"$'\n'
                summary="${summary}| \`${c}\` | ❌ ${detail} |"$'\n'
              fi
            done < "$RESULTS"
          else
            for c in $COMPONENTS; do
              body="${body}❌ \`${c}\` — build/deploy did not run"$'\n'
              summary="${summary}| \`${c}\` | ❌ did not run |"$'\n'
            done
          fi

          # Provenance footer: "PR #23 by author · merged by X · branch". Every part is conditional —
          # the merger appears only when it differs from the author, and the whole footer is empty for a
          # dispatch that carried no PR (a manual/direct one).
          foot=""
          if [ -n "${PR:-}" ]; then
            foot="PR #${PR}"
            [ -n "${AUTHOR:-}" ] && foot="${foot} by ${AUTHOR}"
            [ -n "${MERGER:-}" ] && [ "${MERGER}" != "${AUTHOR:-}" ] && foot="${foot} · merged by ${MERGER}"
            [ -n "${BRANCH:-}" ] && foot="${foot} · ${BRANCH}"
          fi

          echo "$summary" >> "$GITHUB_STEP_SUMMARY"

          [ -n "$WEBHOOK" ] || exit 0
          # Build multi-line strings with bash $'\n' on indented lines — a line less-indented than this
          # run: block would terminate the YAML block scalar and make the workflow unparseable.
          desc="${body}"$'\n'"<${RUN_URL}>"
          # jq assembles the embed so the PR link and footer are added only when present — a {} merge
          # when absent leaves the base embed untouched.
          jq -n --arg t "${EMOJI} release — ${REPO##*/} ${VERSION}" --arg d "$desc" --argjson c "$COLOR" \
            --arg url "${PR_URL:-}" --arg foot "$foot" \
            '{username:"platform-cicd",
              embeds:[( {title:$t, description:$d, color:$c}
                        + (if $url  != "" then {url:$url}               else {} end)
                        + (if $foot != "" then {footer:{text:$foot}}    else {} end) )]}' \
            | curl -fsS --retry 3 --retry-delay 2 --retry-all-errors -H 'Content-Type: application/json' -d @- "$WEBHOOK" >/dev/null \
            || echo "::warning::Discord notification failed after retries (non-fatal) — the deploy result stands" >&2
