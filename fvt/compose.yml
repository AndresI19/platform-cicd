# The FVT traffic runner, on the host — deliberately OUTSIDE the cluster.
#
# It replays the function-verification suite through the vMCP gateway on a loop, keeping the dashboard's
# "Recent Calls" populated. It used to be a Pod (`fvt-traffic` Deployment); moved here for two reasons:
#
#   * vMCP verifies JWT signatures now, so the runner must sign in to platform-auth for a REAL token —
#     the in-cluster forged bearer it used to mint is rejected.
#   * Driving the PUBLIC endpoint (Cloudflare → nginx → vmcp) makes this a genuine end-to-end smoke test
#     of the route a real MCP client takes, not an internal shortcut.
#
# Unlike runner/compose.yml this does NOT join the minikube network: it reaches the platform over the
# public API, so it needs no in-cluster address. The image is still PULLED from registry:5000 (colima's
# daemon trusts that CA), but only the pull touches the registry; the container just needs outbound HTTPS.
services:
  fvt-traffic:
    image: registry:5000/fvt-traffic:latest
    container_name: platform-fvt-traffic
    # Pull the newest :latest whenever compose (re)creates — the systemd unit runs `up --pull always`,
    # so a restart after a CI build picks up the new image.
    pull_policy: always
    # Respawn always — a traffic generator that dies and stays dead is worthless. The script's own
    # `while true` handles a failed RUN; this handles the PROCESS exiting.
    restart: always
    env_file: [.env]
